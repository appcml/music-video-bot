name: 🎬 Ensamblador Video (Prueba)

on:
  workflow_dispatch:
    inputs:
      song_name:
        description: 'Nombre del video / canción'
        required: true
        type: string
      artist:
        description: 'Artista / Fuente'
        required: false
        default: ''
        type: string
      palette:
        description: 'Paleta de colores'
        required: false
        default: 'Oscuro'
        type: choice
        options:
          - Oscuro
          - Luminoso
          - Neon
          - Natural
          - Vintage
          - Pastel
      transition:
        description: 'Tipo de transición'
        required: false
        default: 'Ken Burns'
        type: choice
        options:
          - Ken Burns
          - Fade suave
          - Slide horizontal
          - Slide vertical

jobs:
  generar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🖼️ Verificar archivos del usuario
        run: |
          echo "=========================================="
          echo "  VERIFICANDO ARCHIVOS EN mis_imagenes/"
          echo "=========================================="
          ls -la mis_imagenes/ 2>/dev/null || echo "⚠️ Carpeta no encontrada"
          echo ""
          echo "📸 IMÁGENES:"
          find mis_imagenes/ -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.webp" \) 2>/dev/null | while read f; do echo "   ✓ $(basename "$f")"; done
          echo ""
          echo "🎵 AUDIOS:"
          find mis_imagenes/ -type f \( -name "*.mp3" -o -name "*.wav" -o -name "*.m4a" -o -name "*.flac" \) 2>/dev/null | while read f; do echo "   ✓ $(basename "$f")"; done
          echo ""
          IMG_COUNT=$(find mis_imagenes/ -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.webp" \) 2>/dev/null | wc -l)
          AUD_COUNT=$(find mis_imagenes/ -type f \( -name "*.mp3" -o -name "*.wav" -o -name "*.m4a" -o -name "*.flac" \) 2>/dev/null | wc -l)
          echo "RESUMEN: $IMG_COUNT imágenes, $AUD_COUNT audios"
          echo ""
          if [ "$IMG_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No hay imágenes en mis_imagenes/"
            echo "   Sube tus imágenes (.jpg, .png) antes de ejecutar"
            exit 1
          fi
          if [ "$AUD_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No hay audio en mis_imagenes/"
            echo "   Sube tu audio (.mp3, .wav, .m4a) antes de ejecutar"
            exit 1
          fi
          echo "✅ Todo listo para generar el video!"

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install moviepy pillow numpy

      - name: 🎞️ Instalar FFmpeg y fuentes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: ⚙️ Crear config_cancion.json
        env:
          SONG_NAME: ${{ github.event.inputs.song_name }}
          ARTIST: ${{ github.event.inputs.artist }}
          PALETTE: ${{ github.event.inputs.palette }}
          TRANSITION: ${{ github.event.inputs.transition }}
        run: |
          python3 -c "
          import json, os
          config = {
            'song_name': os.environ.get('SONG_NAME','Video'),
            'artist': os.environ.get('ARTIST',''),
            'palette': os.environ.get('PALETTE','Oscuro'),
            'transition': os.environ.get('TRANSITION','Ken Burns'),
          }
          with open('config_cancion.json','w') as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
          print('✅ Config creado:', json.dumps(config, ensure_ascii=False))
          "

      - name: 🎬 Generar video
        run: python ensamblador_video.py

      - name: 💾 Guardar video en el repo
        if: always()
        run: |
          git config user.name "Ensamblador Bot"
          git config user.email "bot@ensamblador.com"
          
          git add output/ config_cancion.json
          git diff --staged --quiet || git commit -m "🎬 Video prueba: ${{ github.event.inputs.song_name }} [$(date +'%Y-%m-%d %H:%M')]"
          git push || echo "Sin cambios nuevos"

      - name: 📤 Subir video como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-prueba-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: warn
