name: 🎬 Music Video Bot

on:
  workflow_dispatch:
    inputs:
      song_name:
        description: 'Nombre de la canción'
        required: true
        type: string
      artist:
        description: 'Nombre del artista'
        required: true
        type: string
      song_desc:
        description: 'Descripción de qué trata la canción'
        required: true
        type: string
      genres:
        description: 'Géneros (ej: Balada,R&B)'
        required: false
        default: 'Pop'
        type: string
      palette:
        description: 'Paleta de colores'
        required: false
        default: 'Oscuro'
        type: choice
        options:
          - Oscuro
          - Luminoso
          - Neon
          - Natural
          - Vintage
          - Pastel
      transition:
        description: 'Transición entre imágenes'
        required: false
        default: 'Ken Burns (zoom)'
        type: choice
        options:
          - Ken Burns (zoom)
          - Fade suave
          - Slide horizontal
          - Slide vertical
          - Mezcla aleatoria
      text_style:
        description: 'Texto en pantalla'
        required: false
        default: 'Nombre + artista'
        type: choice
        options:
          - Nombre + artista
          - Solo al inicio
          - Sin texto
      effect:
        description: 'Efecto de imagen'
        required: false
        default: 'Sin filtro'
        type: choice
        options:
          - Sin filtro
          - Desaturado (B&N)
          - Cálido
          - Frío
          - Alto contraste
          - Desenfoque suave
      rhythm:
        description: 'Ritmo visual (1=lento, 5=rápido)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      duration:
        description: 'Duración del video'
        required: false
        default: '60 seg (Reel estándar)'
        type: choice
        options:
          - 30 seg (Reel corto)
          - 60 seg (Reel estándar)
          - 90 seg
          - Duración completa
      yt_ref:
        description: 'Estilo de referencia elegido'
        required: false
        default: 'auto'
        type: string
      video_desc:
        description: 'Instrucciones adicionales para el video'
        required: false
        default: ''
        type: string
      spotify_link:
        description: 'Link de Spotify (opcional)'
        required: false
        default: ''
        type: string
      audio_name:
        description: 'Nombre del archivo de audio en mis_imagenes/'
        required: false
        default: ''
        type: string

jobs:
  generar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎞️ Instalar FFmpeg y fuentes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: ⚙️ Crear config_cancion.json
        run: |
          cat > config_cancion.json << 'EOF'
          {
            "song_name":   "${{ github.event.inputs.song_name }}",
            "artist":      "${{ github.event.inputs.artist }}",
            "song_desc":   "${{ github.event.inputs.song_desc }}",
            "video_desc":  "${{ github.event.inputs.video_desc }}",
            "genres":      "${{ github.event.inputs.genres }}",
            "palette":     "${{ github.event.inputs.palette }}",
            "transition":  "${{ github.event.inputs.transition }}",
            "text_style":  "${{ github.event.inputs.text_style }}",
            "effect":      "${{ github.event.inputs.effect }}",
            "rhythm":      "${{ github.event.inputs.rhythm }}",
            "duration":    "${{ github.event.inputs.duration }}",
            "yt_ref":      "${{ github.event.inputs.yt_ref }}",
            "spotify_link":"${{ github.event.inputs.spotify_link }}",
            "audio_name":  "${{ github.event.inputs.audio_name }}",
            "timestamp":   "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: 🎬 Generar video musical
        env:
          GENIUS_TOKEN:       ${{ secrets.GENIUS_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
        run: python music_video_bot.py

      - name: 💾 Guardar video y memoria (git push)
        if: always()
        run: |
          git config user.name  "Music Video Bot"
          git config user.email "bot@musicvideobot.com"
          git add output/ proyectos/proyectos.json config_cancion.json || true
          git diff --staged --quiet || git commit -m "🎬 Video: ${{ github.event.inputs.song_name }} — ${{ github.event.inputs.artist }} [$(date +'%Y-%m-%d %H:%M')]"
          git push || echo "Sin cambios"

      - name: 📤 Subir video como artefacto descargable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.event.inputs.song_name }}-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: warn
