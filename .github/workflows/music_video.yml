name: 🎬 Music Video Bot

on:
  workflow_dispatch:
    inputs:
      song_name:
        description: 'Nombre de la canción'
        required: true
        type: string
      artist:
        description: 'Nombre del artista'
        required: true
        type: string
      song_desc:
        description: 'Descripción de qué trata la canción'
        required: true
        type: string
      genres:
        description: 'Géneros (ej: Balada,R&B)'
        required: false
        default: 'Pop'
        type: string
      palette:
        description: 'Paleta de colores'
        required: false
        default: 'Oscuro'
        type: choice
        options:
          - Oscuro
          - Luminoso
          - Neon
          - Natural
          - Vintage
          - Pastel
      transition:
        description: 'Transición entre imágenes'
        required: false
        default: 'Ken Burns'
        type: choice
        options:
          - Ken Burns
          - Fade suave
          - Slide horizontal
          - Slide vertical
          - Mezcla
      text_style:
        description: 'Texto en pantalla'
        required: false
        default: 'Nombre + artista'
        type: choice
        options:
          - Nombre + artista
          - Solo al inicio
          - Sin texto
      effect:
        description: 'Efecto de imagen'
        required: false
        default: 'Sin filtro'
        type: choice
        options:
          - Sin filtro
          - Desaturado (B&N)
          - Cálido
          - Frío
          - Alto contraste
          - Desenfoque suave
      rhythm:
        description: 'Ritmo visual (1=lento, 5=rápido)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      duration:
        description: 'Duración del video'
        required: false
        default: '60 seg (Reel estándar)'
        type: choice
        options:
          - 30 seg (Reel estándar)
          - 60 seg (Reel estándar)
          - 90 seg (Reel estándar)
          - Completa (Reel estándar)
      yt_ref:
        description: 'Estilo de referencia elegido'
        required: false
        default: 'auto'
        type: string
      video_desc:
        description: 'Instrucciones adicionales para el video'
        required: false
        default: ''
        type: string
      spotify_link:
        description: 'Link de Spotify (opcional)'
        required: false
        default: ''
        type: string
      audio_name:
        description: 'Nombre del archivo de audio en mis_imagenes/'
        required: false
        default: ''
        type: string

jobs:
  generar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🖼️ Verificar imágenes del usuario
        run: |
          echo "=== Imágenes en mis_imagenes/ ==="
          ls -la mis_imagenes/ || echo "Carpeta vacía o no existe"
          echo "=== Audio en mis_imagenes/ ==="
          find mis_imagenes/ -name "*.mp3" -o -name "*.wav" -o -name "*.m4a" 2>/dev/null || echo "Sin audio"

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎞️ Instalar FFmpeg y fuentes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: ⚙️ Crear config_cancion.json
        env:
          SONG_NAME:    ${{ github.event.inputs.song_name }}
          ARTIST:       ${{ github.event.inputs.artist }}
          SONG_DESC:    ${{ github.event.inputs.song_desc }}
          VIDEO_DESC:   ${{ github.event.inputs.video_desc }}
          GENRES:       ${{ github.event.inputs.genres }}
          PALETTE:      ${{ github.event.inputs.palette }}
          TRANSITION:   ${{ github.event.inputs.transition }}
          TEXT_STYLE:   ${{ github.event.inputs.text_style }}
          EFFECT:       ${{ github.event.inputs.effect }}
          RHYTHM:       ${{ github.event.inputs.rhythm }}
          DURATION:     ${{ github.event.inputs.duration }}
          YT_REF:       ${{ github.event.inputs.yt_ref }}
          SPOTIFY_LINK: ${{ github.event.inputs.spotify_link }}
          AUDIO_NAME:   ${{ github.event.inputs.audio_name }}
        run: |
          python3 -c "
          import json, os
          config = {
            'song_name':    os.environ.get('SONG_NAME',''),
            'artist':       os.environ.get('ARTIST',''),
            'song_desc':    os.environ.get('SONG_DESC',''),
            'video_desc':   os.environ.get('VIDEO_DESC',''),
            'genres':       os.environ.get('GENRES','Pop'),
            'palette':      os.environ.get('PALETTE','Oscuro'),
            'transition':   os.environ.get('TRANSITION','Ken Burns'),
            'text_style':   os.environ.get('TEXT_STYLE','Nombre + artista'),
            'effect':       os.environ.get('EFFECT','Sin filtro'),
            'rhythm':       os.environ.get('RHYTHM','3'),
            'duration':     os.environ.get('DURATION','60 seg (Reel estándar)'),
            'yt_ref':       os.environ.get('YT_REF','auto'),
            'spotify_link': os.environ.get('SPOTIFY_LINK',''),
            'audio_name':   os.environ.get('AUDIO_NAME',''),
          }
          with open('config_cancion.json','w') as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
          print('Config creado:', json.dumps(config, ensure_ascii=False)[:200])
          "

      - name: 🎬 Generar video musical
        env:
          GENIUS_TOKEN:       ${{ secrets.GENIUS_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
        run: python music_video_bot.py

      - name: 💾 Guardar video y limpiar archivos temporales
        if: always()
        run: |
          git config user.name  "Music Video Bot"
          git config user.email "bot@musicvideobot.com"

          # Limpiar imágenes y audio subidos por el usuario
          # (mantener solo .gitkeep para que la carpeta exista)
          find mis_imagenes/ -type f ! -name '.gitkeep' -delete || true

          git add output/ proyectos/proyectos.json config_cancion.json mis_imagenes/ || true
          git diff --staged --quiet || git commit -m "🎬 Video: ${{ github.event.inputs.song_name }} — ${{ github.event.inputs.artist }} [$(date +'%Y-%m-%d %H:%M')]"
          git push || echo "Sin cambios"

      - name: 📤 Subir video como artefacto descargable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.event.inputs.song_name }}-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: warn
